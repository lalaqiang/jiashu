name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.3'

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
        continue-on-error: true

      - name: Show build log on failure
        if: always()
        run: |
          echo "===== BUILD LOG (last 100 lines) ====="
          tail -n 100 build.log || true
          echo "===== ERROR LINES ====="
          grep -iE "error:|ERROR:|FAILED|error:" build.log || echo "No error lines found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameSpeedModule-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GameSpeedModule-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
